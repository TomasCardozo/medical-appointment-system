server:
  port: 8083

spring:
  application:
    name: appointment-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true
      client:
        config:
          doctor-service:
            connectTimeout: 2000
            readTimeout: 3000
          auth-service:
            connectTimeout: 2000
            readTimeout: 3000
  datasource:
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        wait-duration-in-open-state: 20s
        failure-rate-threshold: 50
  timelimiter:
    configs:
      default:
        timeout-duration: 3s
        cancel-running-future: true

app:
  security:
    jwt:
      secret: ${AUTH_JWT_SECRET:replace-this-with-a-long-secret-key-at-least-32-bytes}
  rules:
    cancel-cutoff-hours: 24
    reschedule-cutoff-hours: 24
    admin-bypass-cutoffs: true
  reminders:
    window-hours: 24
    scan-interval-ms: 60000
  kafka:
    topics:
      appointment-created: appointment.created
      appointment-cancelled: appointment.cancelled
      appointment-rescheduled: appointment.rescheduled
      appointment-reminder-requested: appointment.reminder.requested
