name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  repo-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f docker-compose.yml
          test -f deploy/compose.dev.yml
          test -f .env.example
          test -f README.md
          test -f LICENSE
          test -f frontend/web-app/Dockerfile

  backend-tests-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-server
          - api-gateway
          - auth-service
          - doctor-service
          - appointment-service
          - notification-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        run: mvn -B -ntp test

      - name: Build package
        working-directory: backend/${{ matrix.service }}
        run: mvn -B -ntp -DskipTests package

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/web-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/web-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build
