spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

server:
  port: ${AUTH_SERVICE_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
